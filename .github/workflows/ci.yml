name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      # The integration test runs `npx jscpd@<version>` for real, which downloads
      # and installs jscpd (~22 MB) into the npx cache on a cold runner. Cache that
      # tree, keyed on the jscpd version, so subsequent runs reuse it instead of
      # re-downloading. (setup-node's npm cache is keyed on package-lock.json, which
      # never changes for jscpd, so it can't keep this warm.)
      - name: Resolve jscpd version and npx cache path
        id: jscpd
        shell: bash
        run: |
          version=$(node -e "const fs=require('fs');const m=fs.readFileSync('src/lib.js','utf8').match(/DEFAULT_VERSION\s*=\s*\"([^\"]+)\"/);process.stdout.write(m[1])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npx-cache=$(npm config get cache | tr -d '\r')/_npx" >> "$GITHUB_OUTPUT"
      - name: Cache npx-installed jscpd
        uses: actions/cache@v4
        with:
          path: ${{ steps.jscpd.outputs.npx-cache }}
          key: npx-jscpd-${{ runner.os }}-node${{ matrix.node-version }}-${{ steps.jscpd.outputs.version }}
      - name: Integration test (real npx jscpd execution)
        run: npm run test:integration

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run build
      - name: Check build is up-to-date
        run: git diff --exit-code servers/jscpd.js
      - name: Check versions match
        run: |
          PKG=$(node -p "require('./package.json').version")
          PLUGIN=$(node -p "require('./.claude-plugin/plugin.json').version")
          LOCK=$(node -p "require('./package-lock.json').version")
          if [ "$PKG" != "$PLUGIN" ] || [ "$PKG" != "$LOCK" ]; then
            echo "::error::Version mismatch: package.json=$PKG, plugin.json=$PLUGIN, package-lock.json=$LOCK"
            exit 1
          fi

  ci:
    runs-on: ubuntu-latest
    needs: [test, checks]
    steps:
      - run: echo "all jobs passed"
