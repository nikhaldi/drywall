name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run build
      - name: Check build is up-to-date
        run: git diff --exit-code servers/jscpd.js
      - name: Check versions match
        run: |
          PKG=$(node -p "require('./package.json').version")
          PLUGIN=$(node -p "require('./.claude-plugin/plugin.json').version")
          LOCK=$(node -p "require('./package-lock.json').version")
          if [ "$PKG" != "$PLUGIN" ] || [ "$PKG" != "$LOCK" ]; then
            echo "::error::Version mismatch: package.json=$PKG, plugin.json=$PLUGIN, package-lock.json=$LOCK"
            exit 1
          fi

  ci:
    runs-on: ubuntu-latest
    needs: [test, checks]
    steps:
      - run: echo "all jobs passed"
